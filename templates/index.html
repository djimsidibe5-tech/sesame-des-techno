<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBerger — Portail Académique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0A1628; --gold: #C9A84C; --white: #FFFFFF;
            --slate: #F7F9FC; --text: #5A6A80; --accent-blue: #4A90D9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--navy); line-height: 1.6; }

        /* Navbar */
        .navbar { position: fixed; width: 100%; top: 0; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 2rem; background: rgba(10,22,40,0.98); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; color: var(--white); font-weight: 900; text-decoration: none; }
        .logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--white); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }

        /* Hero */
        .hero { min-height: 100vh; background: var(--navy); color: var(--white); display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1rem; }
        .hero .accent { color: var(--gold); }

        /* Section Cours */
        .section-padding { padding: 5rem 2rem; }
        .tabs { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
        .tab-btn { padding: 0.6rem 1.5rem; border: 1px solid var(--gold); background: none; color: var(--navy); cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: var(--navy); }
        
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { padding: 1.5rem; border: 1px solid #eee; border-radius: 8px; background: var(--white); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">E<span>Berger</span></a>
    <ul class="nav-links">
        <li><a href="#courses">Cours</a></li>
        <li><a href="#about">Bio</a></li>
    </ul>
</nav>

<header class="hero">
    <div>
        <h1>Excellence en <span class="accent">Sciences</span></h1>
        <p>Portail de ressources pour le parcours ingénierie.</p>
    </div>
</header>

<section id="courses" class="section-padding">
    <div class="tabs" role="tablist">
        <button class="tab-btn active" data-target="l1">Licence 1</button>
        <button class="tab-btn" data-target="l2">Licence 2</button>
    </div>

    <div id="l1" class="tab-content">
        <div class="course-grid">
            <article class="card">
                <h3>Analyse 1</h3>
                <p>Calcul différentiel et intégral.</p>
            </article>
            <article class="card">
                <h3>Algorithmique</h3>
                <p>Fondamentaux de la programmation C.</p>
            </article>
        </div>
    </div>
</section>

<script>
    // Gestion des onglets
    document.querySelectorAll('.tab-btn').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            // Logique de basculement d'affichage ici
        });
    });
</script>

</body>
</html>
